version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/financial_disclosure
      HUBSPOT_API_KEY: ${HUBSPOT_API_KEY}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.amicablerd.uk/webhook/910c3d20-faee-41b9-96d0-e5716c011c5b}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financial_disclosure
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
